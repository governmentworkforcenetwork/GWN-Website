<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Thank You | Government Workforce Network LLC</title>
  <style>
    body {
      margin: 0;
      font-family: Arial, sans-serif;
      background: linear-gradient(180deg, #0b0f1f 0%, #162a63 48%, #0b0f1f 100%);
      color: #fff;
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      padding: 20px;
      text-align: center;
    }

    .card {
      background: rgba(255,255,255,0.97);
      color: #222;
      border-radius: 24px;
      max-width: 700px;
      padding: 40px 30px;
      box-shadow: 0 18px 40px rgba(0,0,0,0.22);
    }

    h1 {
      margin-top: 0;
      font-size: 40px;
      color: #111;
    }

    p {
      line-height: 1.8;
      color: #444;
      font-size: 16px;
    }

    a {
      display: inline-block;
      margin-top: 18px;
      padding: 14px 24px;
      border-radius: 999px;
      background: #d8b24c;
      color: #111;
      text-decoration: none;
      font-weight: 800;
    }
  </style>
</head>
<body>
  <div class="card">
    <h1>Thank You</h1>
    <p>
      Your interest form has been submitted successfully. We appreciate your interest in joining the Government Workforce Network Workforce Intelligence Team.
    </p>
    <p>
      A member of our team will review your submission and follow up if there is a potential fit.
    </p>
    <a href="/workforce-intelligence-team">Back to Workforce Intelligence Team</a>
  </div>
</body>
</html>
